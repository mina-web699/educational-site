<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ToDo List</title>
    <style>
    /* =============1. Reset & Global Styles ========== */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --dark-green: #183630;
  --card-bg: #112723; 
  --off-white: #e3dac9; 
  --gold-accent: #e5c690; 
  --gold-hover: #d4b37b; 

  /* نصوص وظلال */
  --text-light: #e3dac9;
  --text-dark: #183630;
  --shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--off-white);
  color: var(--text-dark);
  min-height: 100vh;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ==============2. Layout Container (.container & .content)  =============== */
.container {
  width: 100%;
  max-width: 550px;
  display: flex;
  flex-direction: column;
  gap: 25px; 
}

.content {
  background-color: var(--dark-green);
  background-image: linear-gradient(145deg, var(--dark-green), var(--card-bg));
  color: var(--text-light);
  width: 100%;
  padding: 35px 30px;
  border-radius: 24px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(229, 198, 144, 0.15); /* إطار ذهبي شفاف ونحيف */
  position: relative;
  overflow: hidden;
}

/* خط تزييني علوي يعزز المظهر الفخم */
.content::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(
    90deg,
    transparent,
    var(--gold-accent),
    transparent
  );
}

/* ==========================================================================
   3. Hero Section & Logo Styles
   ========================================================================== */
.hero-section {
  text-align: center;
  margin-bottom: 30px;
  padding-bottom: 10px;
}

.logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background-color: rgba(229, 198, 144, 0.05);
  padding: 6px 16px;
  border-radius: 50px;
  border: 1px solid rgba(229, 198, 144, 0.15);
  margin-bottom: 15px;
}

.logo span {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--gold-accent);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.hero-section h1 {
  font-size: 1.8rem;
  font-weight: 800;
  color: #fff;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.hero-section p {
  font-size: 0.85rem;
  color: rgba(227, 218, 201, 0.6);
  line-height: 1.5;
  max-width: 380px;
  margin: 0 auto;
}

/* ==========================================================================
   4. Header Filters (.links-of-header)
   ========================================================================== */
.links-of-header {
  display: flex;
  gap: 8px;
  margin-bottom: 25px;
  border-bottom: 1px solid rgba(227, 218, 201, 0.1);
  padding-bottom: 15px;
}

.filter-btn {
  background: transparent;
  border: 1px solid transparent;
  color: rgba(227, 218, 201, 0.5);
  padding: 8px 16px;
  font-size: 0.85rem;
  font-weight: 600;
  border-radius: 30px;
  cursor: pointer;
  transition: var(--transition);
}

.filter-btn:hover {
  color: var(--gold-accent);
}

.filter-btn.active {
  background-color: rgba(229, 198, 144, 0.12);
  border-color: rgba(229, 198, 144, 0.3);
  color: var(--gold-accent);
}

/* ==========================================================================
   5. Inputs Section (.inputs-section)
   ========================================================================== */
.inputs-section {
  display: flex;
  flex-direction: column; 
  gap: 12px;
  margin-bottom: 30px;
}

#task-input, #note-input {
  width: 100%;
  background-color: rgba(227, 218, 201, 0.06);
  border: 1px solid rgba(227, 218, 201, 0.2);
  padding: 14px 16px;
  border-radius: 12px;
  color: var(--text-light);
  font-size: 0.95rem;
  outline: none;
  font-family: inherit;
  transition: var(--transition);
}

#task-input:focus, #note-input:focus {
  border-color: var(--gold-accent);
  background-color: rgba(227, 218, 201, 0.12);
  box-shadow: 0 0 10px rgba(229, 198, 144, 0.05);
}

#task-input::placeholder, #note-input::placeholder {
  color: rgba(227, 218, 201, 0.35);
}

#add-task-btn {
  background-color: var(--gold-accent);
  color: var(--text-dark);
  border: none;
  font-size: 0.9rem;
  font-weight: 700;
  border-radius: 12px;
  cursor: pointer;
  transition: var(--transition);
  padding: 14px 22px;
  width: 100%;
}

#add-task-btn:hover {
  background-color: var(--gold-hover);
  transform: translateY(-1px);
}

#add-task-btn:active {
  transform: translateY(1px);
}

/* ==========================================================================
   6. Body & Lists Container (.body, .tasks, .notes)
   ========================================================================== */
.body h2 {
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--gold-accent);
  margin-bottom: 15px;
  letter-spacing: 0.5px;
}

.tasks, .notes {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 320px;
  overflow-y: auto;
  padding-right: 4px;
}

/* سكرول بار ناعم ومتناسق */
.tasks::-webkit-scrollbar, .notes::-webkit-scrollbar {
  width: 4px;
}
.tasks::-webkit-scrollbar-thumb, .notes::-webkit-scrollbar-thumb {
  background: rgba(227, 218, 201, 0.15);
  border-radius: 10px;
}

/* ==========================================================================
   7. Dynamic Items (Tasks & Notes)
   ========================================================================== */
.task-item, .note-item {
  background-color: rgba(227, 218, 201, 0.04);
  border: 1px solid rgba(227, 218, 201, 0.08);
  padding: 14px 16px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: var(--transition);
  animation: fadeIn 0.3s ease-out forwards;
}

.note-item {
  background-color: rgba(229, 198, 144, 0.03); /* تلميحة ذهبية خفيفة للملاحظات */
  border: 1px solid rgba(229, 198, 144, 0.1);
}

.task-item:hover, .note-item:hover {
  background-color: rgba(227, 218, 201, 0.07);
  border-color: rgba(229, 198, 144, 0.25);
  transform: translateY(-1px);
}

.task-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}

/* التشيك بوكس الفخم */
.custom-checkbox {
  width: 18px;
  height: 18px;
  border: 2px solid var(--gold-accent);
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.task-item.completed .custom-checkbox {
  background-color: var(--gold-accent);
}

.custom-checkbox::after {
  content: "✓";
  font-size: 11px;
  color: var(--text-dark);
  font-weight: bold;
  display: none;
}

.task-item.completed .custom-checkbox::after {
  display: block;
}

.task-text, .note-text {
  font-size: 0.95rem;
  color: var(--text-light);
  transition: var(--transition);
  word-break: break-word;
}

.note-text {
  color: #e3dac9e0;
  flex: 1;
}

.task-item.completed .task-text {
  color: rgba(227, 218, 201, 0.35);
  text-decoration: line-through;
}

/* زر الحذف */
.delete-btn {
  background: transparent;
  border: none;
  color: rgba(227, 218, 201, 0.4);
  cursor: pointer;
  font-size: 1.3rem;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 6px;
  transition: var(--transition);
}

.delete-btn:hover {
  color: #ff6b6b;
  background-color: rgba(255, 107, 107, 0.1);
}

/* أنيميشن دخول العناصر */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ==========================================================================
   8. Main Footer Styles
   ========================================================================== */
.main-footer {
  text-align: center;
  padding: 10px 0;
}

.main-footer p {
  font-size: 0.8rem;
  color: rgba(24, 54, 48, 0.7);
  font-weight: 500;
}

.main-footer span {
  color: var(--dark-green);
  font-weight: 700;
}

/* ==========================================================================
   9. Media Queries for Mobile Responsiveness (تحديث الموبايل)
   ========================================================================== */
@media screen and (max-width: 480px) {
  body {
    padding: 0;
  }

  .container {
    max-width: 100%;
    gap: 0; 
  }

  .content {
    border-radius: 0;
    min-height: 100vh; 
    padding: 30px 20px 100px 20px; 
    display: flex;
    flex-direction: column;
  }


  .main-footer {
    margin-top: auto; 
    padding-top: 30px;
  }
  footer{
    background-color: #817f7be0;
  }

  .main-footer p {
    color: rgba(255, 255, 255, 0.907);
  }

  .main-footer span {
    color: var(--gold-accent);
  }

  .links-of-header {
    justify-content: space-between;
    gap: 4px;
  }

  .filter-btn {
    padding: 6px 10px;
    font-size: 0.75rem;
    flex: 1;
    text-align: center;
  }

  .hero-section h1 {
    font-size: 1.6rem;
  }
  
  .hero-section p {
    font-size: 0.8rem;
  }
}</style>

</head>

<body>
    <div class="container">
        <div class="content">

            <div class="hero-section">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#E5C690" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                    <span>WORK Space</span>
                </div>
                <h1>Master Your Day</h1>
                <p>نظّم مهامك اليومية واكتب ملاحظاتك بحرية، في مكان واحد وبلا حدود.</p>
            </div>

            <div class="links-of-header">
                <button class="filter-btn active" id="all-tasks">All Tasks</button>
                <button class="filter-btn" id="pending-tasks">Active</button>
                <button class="filter-btn" id="completed-tasks">Completed</button>
                <button class="filter-btn" id="notes-tab">Notes</button>
            </div>

            <div class="inputs-section">
                <input type="text" id="task-input" placeholder="Add a new task...">
                <textarea id="note-input" placeholder="Write your note here..."
                    style="display: none; width: 100%; height: 120px; resize: none;"></textarea>
                <button id="add-task-btn">Add Task</button>
            </div>

            <div class="body" id="tasks-wrapper">
                <h2>Tasks List</h2>
                <div class="tasks" id="tasks-container"></div>
            </div>

            <div class="body" id="notes-wrapper" style="display: none;">
                <h2>Notes List</h2>
                <div class="notes" id="notes-container"></div>
            </div>
        </div>

        <footer class="main-footer">
            <p>&copy; 2026 Developed with 🤎 by <span>Mina Maged</span>. All Rights Offline.</p>
        </footer>
    </div>

    <script >/* ==========================================================================
1. Variables & Selectors
========================================================================== */
        // مصفوفات البيانات والتحميل من الـ Local Storage
        let taskData = JSON.parse(localStorage.getItem("tasks")) || [];
        let noteData = JSON.parse(localStorage.getItem("notes")) || [];
        let currentFilter = "all"; // يمكن أن يكون: all, pending, completed, notes

        // عناصر الإدخال والتحكم المشتركة
        const btnAdd = document.getElementById("add-task-btn");
        const inputText = document.getElementById("task-input");

        // عناصر الفلترة والـ Tabs فوق
        const btnAll = document.getElementById("all-tasks");
        const btnPending = document.getElementById("pending-tasks");
        const btnCompleted = document.getElementById("completed-tasks");
        const btnNotesTab = document.getElementById("notes-tab");

        // الحاويات الكبيرة (الWrapper الخاص بكل صفحة)
        const tasksWrapper = document.getElementById("tasks-wrapper");
        const notesWrapper = document.getElementById("notes-wrapper");

        // الحاويات الداخلية اللي بنرسم جواها العناصر
        const container = document.getElementById("tasks-container");
        const notesContainer = document.getElementById("notes-container");

        /* ==========================================================================
           2. Event Listeners (الـ Tabs والتبديل بين الصفحات)
           ========================================================================== */

        // عند الضغط على زرار All Tasks
        btnAll.addEventListener("click", () => {
            currentFilter = "all";
            updateFilterButtons(btnAll);
            switchPage("tasks");
            renderTask();
        });

        // عند الضغط على زرار Active
        btnPending.addEventListener("click", () => {
            currentFilter = "pending";
            updateFilterButtons(btnPending);
            switchPage("tasks");
            renderTask();
        });

        // عند الضغط على زرار Completed
        btnCompleted.addEventListener("click", () => {
            currentFilter = "completed";
            updateFilterButtons(btnCompleted);
            switchPage("tasks");
            renderTask();
        });

        // 🔥 عند الضغط على زرار الـ Notes الجديد (يفتح صفحة الملاحظات)
        btnNotesTab.addEventListener("click", () => {
            currentFilter = "notes";
            updateFilterButtons(btnNotesTab);
            switchPage("notes");
            renderNotes();
        });

        // دالة لتحديث كلاس الـ Active على الأزرار فوق
        function updateFilterButtons(activeButton) {
            [btnAll, btnPending, btnCompleted, btnNotesTab].forEach((btn) => {
                btn.classList.remove("active");
            });
            activeButton.classList.add("active");
        }



        const noteInput = document.getElementById("note-input");

        function switchPage(pageName) {
            if (pageName === "tasks") {
                tasksWrapper.style.display = "block";
                notesWrapper.style.display = "none";

                inputText.style.display = "block";
                noteInput.style.display = "none";
                btnAdd.innerText = "Add Task";
            } else if (pageName === "notes") {
                tasksWrapper.style.display = "none";
                notesWrapper.style.display = "block";

                inputText.style.display = "none";
                noteInput.style.display = "block";
                btnAdd.innerText = "Add Note";
            }
        }

        /* ==========================================================================
           3. الذكاء الاصطناعي لزرار الإضافة المشترك (Add Button)
           ========================================================================== */
        btnAdd.addEventListener("click", () => {
            // 1. لو واقفين في صفحة الملاحظات (بنقرأ ونفحص الـ textarea)
            if (currentFilter === "notes") {
                if (noteInput.value.trim() !== "") {
                    const newNote = {
                        id: Date.now(),
                        text: noteInput.value,
                    };
                    noteData.push(newNote);
                    noteInput.value = ""; // تفريغ مساحة الكتابة
                    renderNotes();
                    noteInput.focus(); // إرجاع المؤشر للكتابة فوراً
                }
            }

            // 2. لو واقفين في صفحة المهام (بنقرأ ونفحص الـ input الصغير)
            else {
                if (inputText.value.trim() !== "") {
                    const newTask = {
                        id: Date.now(),
                        text: inputText.value,
                        completed: false,
                    };
                    taskData.push(newTask);
                    inputText.value = "";
                    renderTask();
                    inputText.focus();
                }
            }
        });

        /* ==========================================================================
           4. Core Functions (الـ Render والـ Save)
           ========================================================================== */

        // دالة عرض وتصفية المهام
        function renderTask() {
            container.innerHTML = "";
            let filteredTask = [];

            if (currentFilter === "all") {
                filteredTask = taskData;
            } else if (currentFilter === "pending") {
                filteredTask = taskData.filter((task) => !task.completed);
            } else if (currentFilter === "completed") {
                filteredTask = taskData.filter((task) => task.completed);
            }

            filteredTask.forEach((task) => {
                const div = document.createElement("div");
                div.classList.add("task-item");

                if (task.completed) {
                    div.classList.add("completed");
                }

                const myDiv = document.createElement("div");
                myDiv.classList.add("custom-checkbox");

                const span = document.createElement("span");
                span.classList.add("task-text");
                span.innerText = task.text;

                const delBtn = document.createElement("button");
                delBtn.classList.add("delete-btn");
                delBtn.innerHTML = "&times;";

                const taskLeft = document.createElement("div");
                taskLeft.classList.add("task-left");
                taskLeft.append(myDiv);
                taskLeft.append(span);

                div.append(taskLeft);
                div.append(delBtn);
                container.append(div);

                // حذف مهمة
                delBtn.addEventListener("click", () => {
                    taskData = taskData.filter((ele) => ele.id !== task.id);
                    renderTask();
                });

                // تشيك بوكس المهمة
                myDiv.addEventListener("click", () => {
                    task.completed = !task.completed;
                    renderTask();
                });
            });
            saveData();
        }

        // 🔥 دالة عرض الملاحظات في صفحتها المستقلة
        function renderNotes() {
            notesContainer.innerHTML = "";

            noteData.forEach((note) => {
                const div = document.createElement("div");
                div.classList.add("note-item");

                const span = document.createElement("span");
                span.classList.add("note-text");
                span.innerText = note.text;

                const delBtn = document.createElement("button");
                delBtn.classList.add("delete-btn");
                delBtn.innerHTML = "&times;";

                div.append(span);
                div.append(delBtn);
                notesContainer.append(div);

                // حذف الملاحظة
                delBtn.addEventListener("click", () => {
                    noteData = noteData.filter((ele) => ele.id !== note.id);
                    renderNotes();
                });
            });
            saveNotes();
        }

        // دوال التخزين في الـ Local Storage
        function saveData() {
            localStorage.setItem("tasks", JSON.stringify(taskData));
        }

        function saveNotes() {
            localStorage.setItem("notes", JSON.stringify(noteData));
        }

        // تشغيل العرض التلقائي أول ما نفتح الصفحة
        renderTask();
        renderNotes();


        if ("serviceWorker" in navigator) {
            navigator.serviceWorker
                .register("./sw.js")
                .then(() => console.log("Service Worker Registered Successfully!"))
                .catch((err) => console.log("Service Worker Failed", err));
        }</script>
</body>

</html>
